site_name: Moonlight Peaks Forschungswiki
site_description: Deutschsprachiges Forschungswiki zu Moonlight Peaks
site_url: https://kjay9558.github.io/Moonlight-Peaks-Forschungswiki/

docs_dir: docs

nav:
  - Start: index.md

  - Spielmechaniken:
      - Übersicht: guide/spielmechaniken.md

  - Gameplay:
      - Übersicht: gameplay/index.md
      - Insekten:
          - Übersicht: gameplay/insects/index.md
          - Fangnetz: gameplay/insects/bug-net.md
          - Insektenarten: reference/generated/getiere.md
          - Insekten nach Fundort: reference/generated/getiere-nach-gebiet.md

  - Nachschlagewerk:
      - Seelentropfen: reference/seelentropfen.md
      - Rezepte und Nahrung: reference/rezepte.md
      - Pflanzen und Bäume: reference/pflanzen.md
      - Zauber: reference/zauber.md
      - NPCs und Geschenke: reference/npcs.md
      - Quests und Story: reference/story.md

  - Forschung:
      - Datenmodell: research/datenmodell.md
      - Arbeitsablauf: research/arbeitsablauf.md
      - Importstatus: research/importstatus.md

theme:
  name: material
  language: de

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.tooltips

  palette:
    - scheme: moonlight
      toggle:
        icon: material/weather-sunny
        name: Zum hellen Design wechseln

    - scheme: default
      primary: deep-purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Zum Moonlight-Darkmode wechseln

plugins:
  - search:
      lang: de

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/moonlight/colors.css
  - stylesheets/moonlight/base.css
  - stylesheets/moonlight/cards.css
  - stylesheets/moonlight/badges.css
  - stylesheets/moonlight/home.css
  - stylesheets/moonlight/content.css
  - stylesheets/moonlight/mobile.css