name: Forschungstagebuch archivieren

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  archive:
    if: startsWith(github.event.issue.title, '[Forschungstagebuch]')
    runs-on: ubuntu-latest

    steps:
      - name: Forschungsakte und Pull Request erzeugen oder aktualisieren
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const dayMatch = issue.title.match(/Tag\s*(\d+)/i);
            const dayNumber = dayMatch ? Number(dayMatch[1]) : null;
            const day = dayNumber ? String(dayNumber).padStart(3, '0') : `issue-${issue.number}`;
            const branch = `research-import/issue-${issue.number}`;
            const path = `archive/forschungstagebuecher/tag-${day}-issue-${issue.number}.md`;

            const repository = await github.rest.repos.get({ owner, repo });
            const base = repository.data.default_branch;
            const baseRef = await github.rest.git.getRef({
              owner,
              repo,
              ref: `heads/${base}`
            });

            let branchExists = true;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            } catch (error) {
              if (error.status !== 404) throw error;
              branchExists = false;
            }

            if (!branchExists) {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${branch}`,
                sha: baseRef.data.object.sha
              });
            }

            const archivedAt = new Date().toISOString();
            const content = [
              '<!--',
              `source_issue: ${issue.number}`,
              `source_url: ${issue.html_url}`,
              `archived_at: ${archivedAt}`,
              'source_type: github_issue',
              'archive_status: originalquelle',
              '-->',
              '',
              issue.body || '',
              ''
            ].join('\n');

            let existingFile;
            try {
              existingFile = await github.rest.repos.getContent({
                owner,
                repo,
                path,
                ref: branch
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              message: existingFile
                ? `archive: Forschungstagebuch Tag ${day} aus Issue #${issue.number} aktualisieren`
                : `archive: Forschungstagebuch Tag ${day} aus Issue #${issue.number}`,
              content: Buffer.from(content, 'utf8').toString('base64'),
              branch,
              ...(existingFile ? { sha: existingFile.data.sha } : {})
            });

            const pulls = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              base
            });

            let pull;
            if (pulls.data.length > 0) {
              pull = pulls.data[0];
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pull.number,
                title: `Forschungstagebuch Tag ${day} archivieren`,
                body: [
                  `Archiviert und aktualisiert die vollständige Forschungsakte aus #${issue.number}.`,
                  '',
                  '## Prüfung',
                  '- [ ] Metadaten und Spieltag stimmen',
                  '- [ ] Chronologie ist vollständig',
                  '- [ ] Beobachtungen und Korrekturen sind enthalten',
                  '- [ ] Offene Fragen bleiben sichtbar',
                  '- [ ] Alle bekannten Medienreferenzen sind aufgeführt',
                  '- [ ] Keine unsichere Angabe wurde als bestätigt dargestellt',
                  '',
                  'Dieser Pull Request verändert keine konsolidierten Daten unter `data/` und keine Wiki-Seiten.'
                ].join('\n')
              });
            } else {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                title: `Forschungstagebuch Tag ${day} archivieren`,
                head: branch,
                base,
                body: [
                  `Archiviert die vollständige Forschungsakte aus #${issue.number}.`,
                  '',
                  '## Prüfung',
                  '- [ ] Metadaten und Spieltag stimmen',
                  '- [ ] Chronologie ist vollständig',
                  '- [ ] Beobachtungen und Korrekturen sind enthalten',
                  '- [ ] Offene Fragen bleiben sichtbar',
                  '- [ ] Alle bekannten Medienreferenzen sind aufgeführt',
                  '- [ ] Keine unsichere Angabe wurde als bestätigt dargestellt',
                  '',
                  'Dieser Pull Request verändert keine konsolidierten Daten unter `data/` und keine Wiki-Seiten.'
                ].join('\n'),
                draft: true
              });
              pull = created.data;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Die Forschungsakte wurde als Draft-PR #${pull.number} vorbereitet: ${pull.html_url}`
              });
            }

            core.notice(`Forschungsakte ${path} verarbeitet; PR #${pull.number}`);